syntax = "proto3";
package fluxguard.ratelimit.v1;

option java_multiple_files = true;
option java_package = "com.fluxguard.grpc.ratelimit.v1";
option java_outer_classname = "RateLimitProto";

service RateLimit {
  rpc CheckLimit(CheckLimitRequest) returns (CheckLimitResponse);
  rpc ReportLoginFailure(ReportLoginFailureRequest) returns (ReportLoginFailureResponse);
}

enum Policy {
  POLICY_UNSPECIFIED = 0;
  POLICY_TRANSACTION = 1;
  POLICY_OPS_RELEASE = 2;
  POLICY_OPS_REJECT  = 3;
  POLICY_LOGIN       = 4;
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_ALLOW = 1;
  DECISION_DENY = 2;
}

message CheckLimitRequest {
  string request_id      = 1;
  Policy policy          = 2;
  string subject         = 3;
  string client_ip       = 4;
  string idempotency_key = 5;
}

message CheckLimitResponse {
  Decision decision     = 1;
  int64 remaining       = 2;
  int64 retry_after_ms  = 3;
  bool  fail_open       = 4;
  string policy_applied = 5;
}

message ReportLoginFailureRequest {
  string request_id = 1;
  string subject    = 2;
  string client_ip  = 3;
}
message ReportLoginFailureResponse {
  int64 failures_in_window = 1;
}
